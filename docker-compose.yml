# arthouse-ops local n8n stack (initial scaffold).
# The full service definition with mounts, healthcheck, and env expression
# support lands on the feat/dashboard-mvp branch.
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
